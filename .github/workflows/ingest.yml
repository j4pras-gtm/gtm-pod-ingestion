name: Clean & Anonymize GTM Data
on:
  push:
    paths:
      - 'raw_input.csv'
  workflow_dispatch:

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        path: repo  # Isolate checkout

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install pandas
      run: pip install pandas

    - name: Run cleaning
      working-directory: repo  # Fix: cd to files
      run: python clean_ingestion.py

    - name: Upload CSV
      uses: actions/upload-artifact@v4
      with:
        name: output-clean
        path: repo/output_clean.csv
