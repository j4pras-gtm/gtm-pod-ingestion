name: Clean & Anonymize GTM Data
on:
  push:
    paths:
      - 'raw_input.csv'  # Triggers only on raw CSV changes
  workflow_dispatch:  # Manual trigger button

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: pip install pandas
      
    - name: Run cleaning script
      run: python clean_ingestion.py
      
    - name: Commit clean CSV
      run: |
        git config user.name "GitHub Action"
        git config user.email "action@github.com"
        git add output_clean.csv
        git diff --staged --quiet || git commit -m "Auto-clean: anonymized ${{ github.sha }}"
        git push
        
        
   - name: Upload clean CSV
      uses
